name: publish

on:
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # Required for JSR's OIDC-based provenance.
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check src/concrete/mod.ts src/naming/mod.ts

      # Every exported symbol needs JSDoc; JSR scores the package on it.
      - name: Doc lint
        run: deno task doc-lint

      - name: Test
        run: deno test --allow-read tests

      # Publishes only when deno.json's version is not already on JSR;
      # re-running on an unchanged version is a no-op rather than a failure.
      - name: Publish to JSR
        run: deno publish
